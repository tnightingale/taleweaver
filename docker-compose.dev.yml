name: taleweaver-dev

services:
  # Production-like deployment (matches Once deployment)
  # Single container with Caddy + FastAPI, exactly like production
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - taleweaver-storage:/storage
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    networks:
      - taleweaver-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Backend development server with auto-reload (for development only)
  backend-dev:
    profiles:
      - dev
    image: python:3.9-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend-dev-venv:/app/venv
    environment:
      - PYTHONPATH=/app
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - STORAGE_PATH=/app/storage
    ports:
      - "8000:8000"
    command: >
      bash -c "
        if [ ! -d venv ]; then
          python -m venv venv &&
          . venv/bin/activate &&
          pip install -q --upgrade pip &&
          pip install -q -r requirements.txt
        fi &&
        . venv/bin/activate &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - taleweaver-dev

  # Test runner for backend (on-demand)
  backend-test:
    image: python:3.9-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend-test-venv:/app/test-venv
    environment:
      - PYTHONPATH=/app
      - STORAGE_PATH=/tmp/test-storage
    command: >
      bash -c "
        apt-get update -qq && apt-get install -qq -y ffmpeg > /dev/null 2>&1 &&
        python -m venv /tmp/venv &&
        . /tmp/venv/bin/activate &&
        pip install -q --upgrade pip &&
        pip install -q -r requirements.txt &&
        python -m pytest tests/ -v
      "
    networks:
      - taleweaver-dev
    profiles:
      - test

  # Frontend development server with hot reload (for development only)
  frontend-dev:
    profiles:
      - dev
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    command: >
      bash -c "
        if [ ! -d node_modules ]; then
          npm install
        fi &&
        npm run dev -- --host 0.0.0.0
      "
    depends_on:
      - backend-dev
    networks:
      - taleweaver-dev

networks:
  taleweaver-dev:
    driver: bridge

volumes:
  taleweaver-storage:
  backend-dev-venv:
  backend-test-venv:
  frontend-node-modules:
