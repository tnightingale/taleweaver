<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="50" cy="50" r="48" fill="#1a0b2e" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Book icon -->
  <g transform="translate(30, 25)">
    <!-- Book pages -->
    <rect x="0" y="5" width="35" height="45" rx="2" fill="url(#gradient)" opacity="0.9"/>
    <rect x="5" y="0" width="35" height="45" rx="2" fill="url(#gradient)"/>
    
    <!-- Book spine line -->
    <line x1="22" y1="0" x2="22" y2="45" stroke="#1a0b2e" stroke-width="1.5"/>
    
    <!-- Magic sparkles -->
    <circle cx="38" cy="10" r="2" fill="#fde047"/>
    <circle cx="42" cy="6" r="1.5" fill="#fde047"/>
    <circle cx="35" cy="15" r="1" fill="#fde047"/>
  </g>
</svg>
