<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1040" />
      <stop offset="100%" style="stop-color:#0d0620" />
    </linearGradient>
    <linearGradient id="pageL" x1="0%" y1="20%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#e2d9f3" />
      <stop offset="100%" style="stop-color:#c4b5fd" />
    </linearGradient>
    <linearGradient id="pageR" x1="100%" y1="20%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:#ddd0f5" />
      <stop offset="100%" style="stop-color:#b8a4f0" />
    </linearGradient>
    <linearGradient id="coverL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9" />
      <stop offset="100%" style="stop-color:#4c1d95" />
    </linearGradient>
    <linearGradient id="coverR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#5b21b6" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e1040;stop-opacity:0" />
    </radialGradient>
    <filter id="warmGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (no transparency) -->
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- Ambient glow behind book -->
  <circle cx="50" cy="36" r="32" fill="url(#glow)"/>

  <!-- Open book — pages fan upward, spine at bottom -->
  <g transform="translate(50, 54)">
    <!-- Left cover (purple, visible edge) -->
    <path d="M-1,-18 L-1,14 C-1,17 -3,18 -5,18 L-24,15 C-26,14.5 -27,13 -27,11 L-27,-14 C-27,-16 -25,-17 -23,-17.5 L-5,-18 C-3,-18 -1,-17 -1,-14 Z"
          fill="url(#coverL)" opacity="0.5"/>
    <!-- Right cover -->
    <path d="M1,-18 L1,14 C1,17 3,18 5,18 L24,15 C26,14.5 27,13 27,11 L27,-14 C27,-16 25,-17 23,-17.5 L5,-18 C3,-18 1,-17 1,-14 Z"
          fill="url(#coverR)" opacity="0.5"/>

    <!-- Left page (light) -->
    <path d="M-0.5,-16 L-0.5,13 C-0.5,15 -2,16 -4,16 L-22,13.5 C-23.5,13 -24,12 -24,10 L-24,-13 C-24,-15 -22.5,-15.5 -21,-16 L-4,-16.5 C-2.5,-16.5 -0.5,-15.5 -0.5,-14 Z"
          fill="url(#pageL)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M0.5,-16 L0.5,13 C0.5,15 2,16 4,16 L22,13.5 C23.5,13 24,12 24,10 L24,-13 C24,-15 22.5,-15.5 21,-16 L4,-16.5 C2.5,-16.5 0.5,-15.5 0.5,-14 Z"
          fill="url(#pageR)" opacity="0.9"/>

    <!-- Spine -->
    <line x1="0" y1="-17" x2="0" y2="15" stroke="#4c1d95" stroke-width="1.5" opacity="0.4"/>

    <!-- Text lines — left page -->
    <line x1="-6" y1="-10" x2="-20" y2="-9" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="-6" y1="-6" x2="-20" y2="-5" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="-6" y1="-2" x2="-20" y2="-1" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="-6" y1="2" x2="-17" y2="2.5" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="-6" y1="6" x2="-20" y2="7" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>

    <!-- Text lines — right page -->
    <line x1="6" y1="-10" x2="20" y2="-9" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="6" y1="-6" x2="20" y2="-5" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="6" y1="-2" x2="20" y2="-1" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
    <line x1="6" y1="2" x2="17" y2="2.5" stroke="#6d28d9" stroke-width="0.6" opacity="0.18"/>
  </g>

  <!-- Magic wisps rising from the book -->
  <path d="M50,36 C46,28 48,22 44,16" fill="none" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M50,36 C54,26 52,20 56,12" fill="none" stroke="#fde68a" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <path d="M50,36 C48,30 50,24 47,18" fill="none" stroke="#a78bfa" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>

  <!-- Sparkles with glow filter -->
  <g filter="url(#warmGlow)">
    <circle cx="44" cy="14" r="2.2" fill="#fde68a" opacity="0.9"/>
    <circle cx="56" cy="10" r="1.8" fill="#fde68a" opacity="0.8"/>
    <circle cx="47" cy="20" r="1.3" fill="#c4b5fd" opacity="0.65"/>
  </g>

  <!-- Small accent sparkles -->
  <circle cx="40" cy="8" r="1" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="58" cy="18" r="0.9" fill="#fde68a" opacity="0.55"/>
  <circle cx="52" cy="5" r="1.1" fill="#e9d5ff" opacity="0.55"/>
  <circle cx="42" cy="22" r="0.7" fill="#fde68a" opacity="0.45"/>

  <!-- Star cross on main sparkle -->
  <g transform="translate(44,14)" fill="url(#gold)" opacity="0.8">
    <rect x="-0.5" y="-3.5" width="1" height="7" rx="0.5"/>
    <rect x="-3.5" y="-0.5" width="7" height="1" rx="0.5"/>
  </g>
  <g transform="translate(56,10) rotate(45)" fill="#fde68a" opacity="0.55">
    <rect x="-0.4" y="-2.5" width="0.8" height="5" rx="0.4"/>
    <rect x="-2.5" y="-0.4" width="5" height="0.8" rx="0.4"/>
  </g>
</svg>
